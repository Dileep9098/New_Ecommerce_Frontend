  <!-- Custom scripts -->
  <script>
    $(document).ready(function () {
      // Slick slider
      $('.category-slider').slick({
        slidesToShow: 6,
        slidesToScroll: 1,
        autoplay: true,
        autoplaySpeed: 2000,
        arrows: false,
        dots: false,
        responsive: [
          { breakpoint: 1200, settings: { slidesToShow: 4 } },
          { breakpoint: 768, settings: { slidesToShow: 2 } },
          { breakpoint: 480, settings: { slidesToShow: 1 } }
        ]
      });

      // Bootstrap tooltips
      const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
      const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl));

      // Owl Carousels
      $("#owlCarousel1").owlCarousel({
        loop: true,
        margin: 10,
        nav: true,
        autoplay: true,
        autoplayTimeout: 3000,
        autoplayHoverPause: true,
        smartSpeed: 1000,
        responsive: {
          0: { items: 1 },
          600: { items: 2 },
          1000: { items: 4 },
        }
      });

      $('.latest-product__slider img').click(function () {
        var newSrc = $(this).attr('data-imgbigurl');
        $('.product__details__pic__item--large').attr('src', newSrc);
      });

      $("#owlCarousel2").owlCarousel({
        loop: true,
        margin: 10,
        autoplay: true,
        autoplayTimeout: 3000,
        autoplayHoverPause: true,
        smartSpeed: 1000,
        responsive: {
          0: { items: 2 },
          600: { items: 2 },
          1000: { items: 6 },
        }
      });

      $("#owlCarousel3").owlCarousel({
        loop: true,
        margin: 10,
        autoplay: true,
        autoplayTimeout: 3000,
        autoplayHoverPause: true,
        smartSpeed: 1000,
        responsive: {
          0: { items: 2 },
          600: { items: 3 },
          1000: { items: 6 },
        }
      });

      $("#owlCarousel4").owlCarousel({
        loop: true,
        margin: 10,
        autoplay: true,
        autoplayTimeout: 3000,
        autoplayHoverPause: true,
        smartSpeed: 1000,
        responsive: {
          0: { items: 3 },
          600: { items: 3 },
          1000: { items: 4 },
        }
      });

      // Fixed mousewheel event for owl carousels
      $('.owl-carousel').on('mousewheel', '.owl-stage', function (e) {
        if (e.deltaY > 0) {
          $(this).closest('.owl-carousel').trigger('next.owl.carousel');
        } else {
          $(this).closest('.owl-carousel').trigger('prev.owl.carousel');
        }
        e.preventDefault();
      });
    });
  </script>
