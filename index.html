  <script>
    $(document).ready(function () {
      $("#owlCarousel1").owlCarousel({
        loop: true,
        margin: 10,
        nav: true,
        autoplay: true,
        autoplayTimeout: 3000,
        autoplayHoverPause: true,
        smartSpeed: 1000,
        responsive: {
          0: { items: 1 },
          600: { items: 2 },
          1000: { items: 4 },
        }
      });
      $('.latest-product__slider img').click(function () {
        var newSrc = $(this).attr('data-imgbigurl'); // Get the full-size image URL
        $('.product__details__pic__item--large').attr('src', newSrc); // Change the main image
      });
      $("#owlCarousel2").owlCarousel({
        loop: true,
        margin: 10,
        autoplay: true,

          1000: { items: 4 },
        }

      // owl.trigger('refresh.owl.carousel');

      owl.on('mousewheel', '.owl-stage', function (e) {
        if (e.deltaY > 0) {
          owl.trigger('next.owl');
        } else {
          owl.trigger('prev.owl');
        }
        e.preventDefault();
      });

    });





  </script>
